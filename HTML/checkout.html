<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StepZone | Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/reset.css" />
    <link rel="stylesheet" href="../CSS/main.css" />
    <link rel="stylesheet" href="../CSS/components.css" />
    <link rel="stylesheet" href="../CSS/responsive.css" />
</head>
<body>
    <header class="header">
        <div class="container header__content">
            <a href="index.html" class="logo">Step<span>Zone</span></a>

            <nav class="nav">
                <a href="index.html">Loja</a>
                <a href="#orderSummary">Resumo</a>
                <a href="#paymentSection">Pagamento</a>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container checkout-page">
            <section class="checkout-main">
                <div class="section__header section__header--left">
                    <h1>Finalizar Compra</h1>
                    <p>Revise seus itens e escolha a forma de pagamento.</p>
                </div>

                <section class="checkout-block" id="orderSummary">
                    <h2>Resumo do pedido</h2>
                    <div id="checkoutItems" class="checkout-items">
                        <!-- Itens renderizados via JS -->
                    </div>
                </section>

                <section class="checkout-block" id="paymentSection">
                    <h2>Pagamento</h2>

                    <form id="checkoutForm" class="checkout-form">
                        <div class="form-group">
                            <label for="customerName">Nome completo</label>
                            <input
                                type="text"
                                id="customerName"
                                class="input"
                                placeholder="Digite seu nome"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="paymentMethod">Método de pagamento</label>
                            <select id="paymentMethod" class="select" required>
                                <option value="">Selecione uma opção</option>
                                <option value="pix">Pix</option>
                                <option value="credito">Cartão de crédito</option>
                                <option value="debito">Cartão de débito</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn--primary btn--full">
                            Finalizar compra
                        </button>
                    </form>
                </section>
            </section>

            <aside class="checkout-sidebar">
                <div class="checkout-summary-card">
                    <h2>Total da compra</h2>

                    <div class="summary-line">
                        <span>Subtotal</span>
                        <strong id="checkoutSubtotal">R$ 0,00</strong>
                    </div>

                    <div class="summary-line">
                        <span>Desconto</span>
                        <strong id="checkoutDiscount">R$ 0,00</strong>
                    </div>

                    <div class="summary-line summary-line--total">
                        <span>Total</span>
                        <strong id="checkoutTotal">R$ 0,00</strong>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div id="toast" class="toast">Ação realizada</div>

    <script src="../JS/products.js"></script>
    <script src="../JS/storage.js"></script>
    <script src="../JS/cart.js"></script>
    <script src="../JS/checkout.js"></script>
</body>
</html>
